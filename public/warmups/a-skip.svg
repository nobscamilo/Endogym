<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>A-skip — drill de calentamiento</title>
<desc>Figura animada realizando el A-skip: rodilla a la altura de la cadera con pie en dorsiflexión, brazo contrario al frente y rebote corto sobre la pierna de apoyo.</desc>
<style>
.athlete{animation:hop 1.1s linear infinite}
.rleg{animation:thighR 1.1s ease-in-out infinite;transform-origin:342px 160px}
.rshank{animation:shankR 1.1s ease-in-out infinite;transform-origin:344px 198px}
.lleg{animation:thighL 1.1s ease-in-out infinite;transform-origin:340px 160px}
.lshank{animation:shankL 1.1s ease-in-out infinite;transform-origin:336px 198px}
.rarm{animation:armR 1.1s ease-in-out infinite;transform-origin:336px 112px}
.larm{animation:armL 1.1s ease-in-out infinite;transform-origin:334px 112px}
.flow{animation:dash 1.1s linear infinite}
@keyframes hop{0%,25%,50%,75%,100%{transform:translateY(0)}12.5%,62.5%{transform:translateY(-8px)}37.5%,87.5%{transform:translateY(-3px)}}
@keyframes thighR{0%,50%,100%{transform:rotate(8deg)}25%{transform:rotate(-82deg)}75%{transform:rotate(16deg)}}
@keyframes shankR{0%,50%,100%{transform:rotate(-6deg)}25%{transform:rotate(90deg)}75%{transform:rotate(-12deg)}}
@keyframes thighL{0%,50%,100%{transform:rotate(8deg)}25%{transform:rotate(16deg)}75%{transform:rotate(-82deg)}}
@keyframes shankL{0%,50%,100%{transform:rotate(-6deg)}25%{transform:rotate(-12deg)}75%{transform:rotate(90deg)}}
@keyframes armL{0%,50%,100%{transform:rotate(4deg)}25%{transform:rotate(-50deg)}75%{transform:rotate(44deg)}}
@keyframes armR{0%,50%,100%{transform:rotate(4deg)}25%{transform:rotate(44deg)}75%{transform:rotate(-50deg)}}
@keyframes dash{to{stroke-dashoffset:-44}}
@media (prefers-reduced-motion: reduce){.athlete,.rleg,.rshank,.lleg,.lshank,.rarm,.larm,.flow{animation:none}}
</style>
<g class="athlete">
<g class="larm" stroke="#c4b5fd" stroke-width="7" stroke-linecap="round" fill="none">
<path d="M334,112 L330,138 L344,151"/>
</g>
<g class="lleg">
<line x1="340" y1="160" x2="336" y2="198" stroke="#c4b5fd" stroke-width="8" stroke-linecap="round"/>
<g class="lshank" stroke="#c4b5fd" stroke-width="8" stroke-linecap="round" fill="none">
<path d="M336,198 L336,232 L348,230"/>
</g>
</g>
<path d="M342,162 L336,112" stroke="#a855f7" stroke-width="10" stroke-linecap="round" fill="none"/>
<circle cx="339" cy="96" r="11" fill="#a855f7"/>
<g class="rleg">
<line x1="342" y1="160" x2="344" y2="198" stroke="#a855f7" stroke-width="9" stroke-linecap="round"/>
<g class="rshank" stroke="#a855f7" stroke-width="9" stroke-linecap="round" fill="none">
<path d="M344,198 L343,232 L356,230"/>
</g>
</g>
<g class="rarm" stroke="#a855f7" stroke-width="8" stroke-linecap="round" fill="none">
<path d="M336,112 L341,138 L355,150"/>
</g>
</g>
<line x1="220" y1="244" x2="460" y2="244" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
<line class="flow" x1="220" y1="252" x2="460" y2="252" stroke="#a855f7" stroke-width="2" stroke-dasharray="10 12" stroke-linecap="round" opacity="0.35"/>
<text x="340" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Rodilla a la cadera · pie activo (punta arriba) · contacto corto y elástico</text>
</svg>
